name: CI/CD — Dev

on:
  push:
    branches:
      - dev

concurrency:
  group: ci-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # 1. PREPARE — Validar que el install funciona
  # ─────────────────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}-${{ hashFiles('package-lock.json') }}

  # ─────────────────────────────────────────────
  # 2. VALIDATE — Lint (errores bloquean, warnings no)
  # ─────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}-${{ hashFiles('package-lock.json') }}

      - name: Lint (errores = falla | warnings = OK)
        run: npm run lint

  # ─────────────────────────────────────────────
  # 3. BUILD — Validar que el build compila
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}-${{ hashFiles('package-lock.json') }}

      - name: Build
        env:
          NEXT_PUBLIC_RUTA_BACKEND: ${{ secrets.NEXT_PUBLIC_RUTA_BACKEND }}
          NEXT_PUBLIC_RUTA_DOMAIN: ${{ secrets.NEXT_PUBLIC_RUTA_DOMAIN }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          NEXT_PUBLIC_TINYMCE_KEY: ${{ secrets.NEXT_PUBLIC_TINYMCE_KEY }}
          NEXT_PUBLIC_USERNAME_GEONAMES: ${{ secrets.NEXT_PUBLIC_USERNAME_GEONAMES }}
        run: npm run build

  # ─────────────────────────────────────────────
  # 4. UPLOAD — SSH a Lightsail y ejecutar deploy-dev.sh
  # ─────────────────────────────────────────────
  upload:
    name: Upload & Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    outputs:
      deploy_sha: ${{ github.sha }}
    steps:
      - name: Ejecutar deploy-dev.sh en Lightsail
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -e
            echo "🚀 Iniciando deploy — SHA: ${{ github.sha }}"
            bash ~/deploy-dev.sh
            echo "✅ deploy-dev.sh completado"

  # ─────────────────────────────────────────────
  # 5. DEPLOY — Validar que la app responde tras el deploy
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy — Health Check
    runs-on: ubuntu-latest
    needs: upload
    environment: dev
    steps:
      - name: Esperar que la app levante
        run: sleep 15

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${{ secrets.APP_HEALTH_URL }}")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "❌ Health check falló con status $STATUS"
            exit 1
          fi
          echo "✅ La app responde correctamente (HTTP $STATUS)"

      - name: Registrar SHA desplegado
        run: |
          echo "SHA desplegado: ${{ github.sha }}"
          echo "Rama: ${{ github.ref_name }}"
          echo "Commit: ${{ github.event.head_commit.message }}"
