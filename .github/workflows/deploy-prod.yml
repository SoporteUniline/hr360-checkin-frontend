name: Deploy — Prod (Manual)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo del deploy (para el log)"
        required: false
        default: "Deploy a producción"
        type: string

concurrency:
  group: adamia-lightsail-deploy
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # 1. PREPARE
  # ─────────────────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-modules-prod-${{ github.sha }}-${{ hashFiles('package-lock.json') }}

  # ─────────────────────────────────────────────
  # 2. VALIDATE
  # ─────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-prod-${{ github.sha }}-${{ hashFiles('package-lock.json') }}

      - name: Lint
        run: npm run lint

  # ─────────────────────────────────────────────
  # 3. BUILD
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: validate
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-prod-${{ github.sha }}-${{ hashFiles('package-lock.json') }}

      - name: Build
        env:
          NEXT_PUBLIC_RUTA_BACKEND: ${{ secrets.NEXT_PUBLIC_RUTA_BACKEND }}
          NEXT_PUBLIC_RUTA_DOMAIN: ${{ secrets.NEXT_PUBLIC_RUTA_DOMAIN }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          NEXT_PUBLIC_TINYMCE_KEY: ${{ secrets.NEXT_PUBLIC_TINYMCE_KEY }}
          NEXT_PUBLIC_USERNAME_GEONAMES: ${{ secrets.NEXT_PUBLIC_USERNAME_GEONAMES }}
        run: npm run build

  # ─────────────────────────────────────────────
  # 4. DEPLOY
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: prod
    steps:
      - name: Ejecutar deploy-prod.sh en Lightsail
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            echo "🚀 Iniciando deploy — SHA: ${{ github.sha }}"
            echo "   Motivo: ${{ inputs.reason }}"
            echo "   Ejecutado por: ${{ github.actor }}"
            bash ~/adamia/deploy-prod.sh
            echo "✅ deploy-prod.sh completado"

  # ─────────────────────────────────────────────
  # 5. HEALTH CHECK
  # ─────────────────────────────────────────────
  health:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    environment: prod
    steps:
      - name: Esperar que la app levante
        run: sleep 20

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${{ secrets.APP_HEALTH_URL }}")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "❌ Health check falló con status $STATUS"
            exit 1
          fi
          echo "✅ La app responde correctamente (HTTP $STATUS)"

      - name: Resumen del deploy
        if: success()
        run: |
          echo "## Deploy a producción completado ✅" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Motivo | ${{ inputs.reason }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ejecutado por | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fecha | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
